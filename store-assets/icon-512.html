<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 512px; height: 512px; overflow: hidden; background: transparent; }
</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 64 64" fill="none">
  <defs>
    <radialGradient id="pot" cx="24" cy="22" r="38" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#F5C878"/>
      <stop offset="50%"  stop-color="#C07838"/>
      <stop offset="100%" stop-color="#7A3F10"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#1C0E06"/>

  <!-- Onggi silhouette -->
  <path d="
    M 32 56
    C 43 56 54 49 54 38
    C 54 27 46 21 38 18
    L 38 14
    L 41 14
    L 41 10
    L 23 10
    L 23 14
    L 26 14
    L 26 18
    C 18 21 10 27 10 38
    C 10 49 21 56 32 56
    Z
  " fill="url(#pot)"/>

  <!-- Rim top edge highlight -->
  <rect x="23" y="10" width="18" height="2.5" rx="1.25" fill="#F0D090" opacity="0.6"/>

  <!-- Shine on belly -->
  <ellipse cx="20" cy="36" rx="3" ry="7.5"
           transform="rotate(-18 20 36)"
           fill="white" opacity="0.13"/>

  <!-- Coil texture lines -->
  <path d="M 14 43 Q 32 46 50 43" stroke="#6B3510" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <path d="M 11 36 Q 32 39 53 36" stroke="#6B3510" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <path d="M 13 29 Q 32 31 51 29" stroke="#6B3510" stroke-width="1"   stroke-linecap="round" opacity="0.35"/>
</svg>
</body>
</html>
